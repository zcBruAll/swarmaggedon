services:
  mongo:
    image: mongo:7.0
    container_name: swarm-mongo
    restart: always
    expose:
    - "27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - swarm-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend/
    container_name: swarm-backend
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "2877:2877"
    env_file: ".env"
    restart: always
    networks:
      - swarm-network
  frontend:
    build: 
      context: ./frontend/
    container_name: swarm-frontend
    depends_on:
      - backend
    ports:
      - "7782:80"
    env_file: ".env"
    restart: always
    networks:
      - swarm-network

networks:
  swarm-network:
    driver: bridge

volumes:
  mongodb_data: